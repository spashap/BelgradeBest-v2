name: Content freshness

# Runs in GitHub's cloud — your computer does NOT need to be on.
# Weekly scan that flags articles whose perishable facts may be going stale and
# posts the ranked list to the workflow run summary (+ an optional webhook).
on:
  schedule:
    - cron: "0 7 * * 1" # every Monday 07:00 UTC
  workflow_dispatch: {} # lets you run it on demand from the Actions tab

jobs:
  freshness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Scan content freshness
        run: node scripts/check-freshness.mjs --months 9 --top 25
        env:
          # Optional: set this repo secret to also get a Slack/Discord ping.
          FRESHNESS_WEBHOOK_URL: ${{ secrets.FRESHNESS_WEBHOOK_URL }}
